# ╭──────────────────────────────────────────────────────────╮
# │                         Plugins                          │
# ╰──────────────────────────────────────────────────────────╯

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ╭──────────────────────────────────────────────────────────╮
# │                         Options                          │
# ╰──────────────────────────────────────────────────────────╯

# Enable true color
set -g default-terminal 'tmux-256color'
set-option -sa terminal-features ',xterm-kitty:RGB:clipboard'
set-option -s set-clipboard on

# Base options
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g mouse on
set -g cursor-style block
set -g allow-rename on
set -sg escape-time 10
set -sg repeat-time 500

# Key bindings
set-window-option -g mode-keys vi

# Prefix
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# ╭──────────────────────────────────────────────────────────╮
# │                         Theme                            │
# ╰──────────────────────────────────────────────────────────╯

set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=default,fg=#cdd6f4'
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100

# CPU Colors
set -g @cpu_high_fg_color "#[fg=#f38ba8]"
set -g @cpu_low_fg_color "#[fg=#a6e3a1]"
set -g @cpu_medium_fg_color "#[fg=#f9e2af]"
set -g @cpu_temp_high_fg_color "#[fg=#f38ba8]"
set -g @cpu_temp_low_fg_color "#[fg=#a6e3a1]"
set -g @cpu_temp_medium_fg_color "#[fg=#f9e2af]"

# Pane borders
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#f9e2af'

# Window status
set -g window-status-style 'fg=#585b70'
set -g window-status-current-style 'fg=#cba6f7,bold'

set -g window-status-format "#I:#W"
set -g window-status-current-format "[#I:#W]"

# Status left - session name and path
set -g status-left "#[fg=black]  #S #[fg=colour6]#{pane_current_path} "

# Status right - hostname by default, overridden by platform profiles
set -g status-right "#[fg=colour24] #h"

# Copy mode styles
set -g copy-mode-match-style 'fg=#1e1e2e,bg=#cdd6f4'
set -g copy-mode-current-match-style 'fg=#1e1e2e,bg=#d20f39'

# ╭──────────────────────────────────────────────────────────╮
# │                       Keybindings                        │
# ╰──────────────────────────────────────────────────────────╯

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Open new window in current directory
bind c new-window -c ~

# Clear scrollback buffer
bind K send-keys "clear"\; send-keys "Enter"\; clear-history

# Reload tmux.conf
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

# Window/session tree
bind s choose-tree -swZ
bind w choose-tree -wZ

# Visual mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-end-of-line

# Resize panes with Shift
bind -n S-Up    resize-pane -U 5
bind -n S-Down  resize-pane -D 5
bind -n S-Left  resize-pane -L 5
bind -n S-Right resize-pane -R 5

# Move windows
bind -n M-S-Left swap-window -t -1\; select-window -t -1
bind -n M-S-Right swap-window -t +1\; select-window -t +1

# Smart split
bind i run-shell " \
if [ $(( \$(tmux display -p '8*#{pane_width}-20*#{pane_height}') )) -lt 0 ]; then \
  tmux splitw -v -c '#{pane_current_path}'; \
else \
  tmux splitw -h -c '#{pane_current_path}'; \
fi"

# Platform profiles
if-shell 'test "$(uname -s)" = Darwin' 'source-file ~/.config/tmux/macos.conf'
if-shell 'test -n "$SSH_CONNECTION"' 'source-file ~/.config/tmux/remote.conf'

# Keep TPM last so plugin bindings are not overwritten by this file.
if-shell 'test -x "$HOME/.tmux/plugins/tpm/tpm"' 'run-shell "$HOME/.tmux/plugins/tpm/tpm"'
